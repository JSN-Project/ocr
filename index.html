<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Pokémon Card Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        /* Hidden canvas used to capture the photo */
        canvas {
            display: none; 
        }
        #snapshotPreview {
            width: 100%;
            max-width: 500px;
            display: none;
            margin: 0 auto 20px auto;
            border: 2px solid #2563eb;
            border-radius: 8px;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin: 15px 0;
            font-weight: 600;
            color: #2563eb;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Live Pokédex Scanner</h2>
        <p style="text-align: center;">Hold your card steady in front of the camera and click Scan.</p>

        <div class="camera-container" id="videoContainer">
            <video id="cameraFeed" autoplay playsinline></video>
        </div>

        <img id="snapshotPreview" alt="Captured Card">

        <canvas id="captureCanvas"></canvas>

        <div class="controls">
            <button id="scanBtn">📸 Capture & Scan</button>
            <button id="resetBtn" style="display: none; background-color: #475569;">🔄 Scan Another Card</button>
        </div>
        
        <div id="status">Waiting for camera permission...</div>
        
        <textarea id="output" placeholder="The extracted text from your Pokémon card will appear here..." readonly></textarea>
    </div>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('captureCanvas');
        const snapshotPreview = document.getElementById('snapshotPreview');
        const videoContainer = document.getElementById('videoContainer');
        const scanBtn = document.getElementById('scanBtn');
        const resetBtn = document.getElementById('resetBtn');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let stream = null;

        // 1. Initialize the camera
        async function startCamera() {
            try {
                // facingMode: 'environment' attempts to use the rear camera on mobile phones
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                status.textContent = "Camera ready! Hold the card steady.";
            } catch (err) {
                console.error("Error accessing camera:", err);
                status.textContent = "Error: Could not access the camera. Make sure you are running on localhost and gave permission.";
                status.style.color = "red";
                scanBtn.disabled = true;
            }
        }

        // Start camera on page load
        startCamera();

        // 2. Handle the "Capture & Scan" button click
        scanBtn.addEventListener('click', async () => {
            // Set canvas dimensions to match the video stream
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Draw the current video frame onto the canvas
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas to an image data URL
            const imageData = canvas.toDataURL('image/jpeg', 0.9);

            // Update UI: Hide video, show snapshot, swap buttons
            videoContainer.style.display = 'none';
            snapshotPreview.src = imageData;
            snapshotPreview.style.display = 'block';
            scanBtn.style.display = 'none';
            resetBtn.style.display = 'inline-block';
            
            status.textContent = "Status: Loading OCR engine and processing... (This may take a moment)";
            status.style.color = "#2563eb";
            output.value = "";

            try {
                // 3. Run Tesseract.js on the captured image data
                const result = await Tesseract.recognize(imageData, 'eng', {
                    logger: message => {
                        if (message.status === 'recognizing text') {
                            const progress = Math.round(message.progress * 100);
                            status.textContent = `Status: Scanning card... ${progress}%`;
                        }
                    }
                });

                status.textContent = "Status: Scan Complete!";
                output.value = result.data.text;

            } catch (error) {
                console.error(error);
                status.textContent = "Status: Error processing image.";
                status.style.color = "red";
                output.value = "An error occurred during scanning: " + error.message;
            }
        });

        // 4. Handle "Scan Another Card" button
        resetBtn.addEventListener('click', () => {
            snapshotPreview.style.display = 'none';
            videoContainer.style.display = 'block';
            scanBtn.style.display = 'inline-block';
            resetBtn.style.display = 'none';
            output.value = "";
            status.textContent = "Camera ready! Hold the card steady.";
            status.style.color = "#2563eb";
        });
    </script>
</body>
</html>
