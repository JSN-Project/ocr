<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Pokémon Card Scanner - Cropped</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* Camera Container & Overlays */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }

        /* 1. Main Alignment Frame (Green) */
        .alignment-frame {
            position: absolute;
            top: 5%; 
            left: 5%; 
            right: 5%; 
            bottom: 5%;
            border: 2px dashed #22c55e;
            border-radius: 12px;
            pointer-events: none; /* Lets clicks pass through */
            z-index: 10;
        }

        /* 2. Target Crop Frame (Blue - Bottom Left) */
        .crop-frame {
            position: absolute;
            bottom: 5%; /* Matches the bottom of the green frame */
            left: 5%;   /* Matches the left of the green frame */
            width: 35%; /* Width of the set number area */
            height: 12%; /* Height of the set number area */
            border: 2px solid #3b82f6;
            background-color: rgba(59, 130, 246, 0.2); /* Slight blue tint */
            pointer-events: none;
            z-index: 11;
        }

        canvas {
            display: none; 
        }
        
        /* Show the specific cropped image */
        #snapshotPreview {
            width: auto;
            max-width: 100%;
            display: none;
            margin: 0 auto 20px auto;
            border: 2px solid #3b82f6;
            border-radius: 4px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin: 15px 0;
            font-weight: 600;
            color: #2563eb;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 24px; /* Larger font since it's just a few characters */
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            resize: vertical;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pokémon Card Set Number Scanner</h2>
        <p style="text-align: center;">Align the card in the green box. Place the bottom-left number (e.g. 038/164) inside the blue box.</p>

        <div class="camera-container" id="videoContainer">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="alignment-frame"></div>
            <div class="crop-frame" id="cropBox
