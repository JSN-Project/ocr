<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Pokémon Card Scanner - Cropped</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* Camera Container & Overlays */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }

        /* 1. Main Alignment Frame (Green) */
        .alignment-frame {
            position: absolute;
            top: 5%; 
            left: 5%; 
            right: 5%; 
            bottom: 5%;
            border: 2px dashed #22c55e;
            border-radius: 12px;
            pointer-events: none; /* Lets clicks pass through */
            z-index: 10;
        }

        /* 2. Target Crop Frame (Blue - Bottom Left) */
        .crop-frame {
            position: absolute;
            bottom: 5%; /* Matches the bottom of the green frame */
            left: 5%;   /* Matches the left of the green frame */
            width: 35%; /* Width of the set number area */
            height: 12%; /* Height of the set number area */
            border: 2px solid #3b82f6;
            background-color: rgba(59, 130, 246, 0.2); /* Slight blue tint */
            pointer-events: none;
            z-index: 11;
        }

        canvas {
            display: none; 
        }
        
        /* Show the specific cropped image */
        #snapshotPreview {
            width: auto;
            max-width: 100%;
            display: none;
            margin: 0 auto 20px auto;
            border: 2px solid #3b82f6;
            border-radius: 4px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin: 15px 0;
            font-weight: 600;
            color: #2563eb;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 24px; /* Larger font since it's just a few characters */
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            resize: vertical;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pokémon Card Set Number Scanner</h2>
        <p style="text-align: center;">Align the card in the green box. Place the bottom-left number (e.g. 038/164) inside the blue box.</p>

        <div class="camera-container" id="videoContainer">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="alignment-frame"></div>
            <div class="crop-frame" id="cropBox"></div>
        </div>

        <div style="text-align: center;">
            <img id="snapshotPreview" alt="Cropped Target Area">
        </div>

        <canvas id="captureCanvas"></canvas>

        <div class="controls">
            <button id="scanBtn">📸 Capture Number</button>
            <button id="resetBtn" style="display: none; background-color: #475569;">🔄 Scan Another</button>
        </div>
        
        <div id="status">Waiting for camera permission...</div>
        
        <textarea id="output" placeholder="Set Number..." readonly></textarea>
    </div>

   <script>
    const video = document.getElementById('cameraFeed');
    const canvas = document.getElementById('captureCanvas');
    const snapshotPreview = document.getElementById('snapshotPreview');
    const videoContainer = document.getElementById('videoContainer');
    const scanBtn = document.getElementById('scanBtn');
    const resetBtn = document.getElementById('resetBtn');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const cropBox = document.getElementById('cropBox');

    let stream = null;

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                status.textContent = "Camera ready! Align the card and click Capture.";
            };
        } catch (err) {
            console.error("Error accessing camera:", err);
            status.textContent = "Error: Could not access the camera.";
            status.style.color = "red";
            scanBtn.disabled = true;
        }
    }

    startCamera();

    scanBtn.addEventListener('click', async () => {
        // Calculate exactly where the blue crop box is relative to the actual video resolution
        const videoRatio = video.videoWidth / video.clientWidth;
        
        // The blue box CSS is: left 5%, width 35%, bottom 5%, height 12%
        const startX = video.clientWidth * 0.05 * videoRatio;
        const startY = video.clientHeight * (1 - 0.05 - 0.12) * videoRatio; 
        const cropWidth = video.clientWidth * 0.35 * videoRatio;
        const cropHeight = video.clientHeight * 0.12 * videoRatio;

        // Set canvas to ONLY the size of the cropped area
        canvas.width = cropWidth;
        canvas.height = cropHeight;

        // Draw just that small segment onto the canvas
        const context = canvas.getContext('2d');
        context.drawImage(
            video, 
            startX, startY, cropWidth, cropHeight, // Source Coordinates
            0, 0, cropWidth, cropHeight            // Destination Coordinates
        );

        const imageData = canvas.toDataURL('image/jpeg', 1.0);

        // UI Updates
        videoContainer.style.display = 'none';
        snapshotPreview.src = imageData;
        snapshotPreview.style.display = 'inline-block';
        scanBtn.style.display = 'none';
        resetBtn.style.display = 'inline-block';
        
        status.textContent = "Status: Analyzing set number...";
        status.style.color = "#2563eb";
        output.value = "";

        try {
            // Run OCR specifically on the cropped image data
            const result = await Tesseract.recognize(imageData, 'eng');

            status.textContent = "Status: Scan Complete!";
            const rawText = result.data.text;

            // REGEX FILTER: Look for 3 digits, a slash, and 3 digits (e.g., 038/164)
            const match = rawText.match(/\d{3}\/\d{3}/);

            if (match) {
                // If it finds the pattern, ONLY output the pattern
                output.value = match[0];
            } else {
                // Fallback if it fails to find the exact pattern
                output.value = "Number pattern not found. Raw read:\n" + rawText.trim();
            }

        } catch (error) {
            console.error(error);
            status.textContent = "Status: Error processing image.";
            status.style.color = "red";
            output.value = "Error: " + error.message;
        }
    });

    resetBtn.addEventListener('click', () => {
        snapshotPreview.style.display = 'none';
        videoContainer.style.display = 'block';
        scanBtn.style.display = 'inline-block';
        resetBtn.style.display = 'none';
        output.value = "";
        status.textContent = "Camera ready! Align the card and click Capture.";
        status.style.color = "#2563eb";
    });
</script>
</body>
</html>
